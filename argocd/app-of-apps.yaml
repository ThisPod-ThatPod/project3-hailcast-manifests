apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hailcast-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/ThisPod-ThatPod/project3-hailcast-manifests.git'
    targetRevision: dev
    path: argocd/applications
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true