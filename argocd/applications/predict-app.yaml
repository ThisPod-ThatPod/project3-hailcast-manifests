apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predict
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/ThisPod-ThatPod/project3-hailcast-manifests.git'
    targetRevision: main
    path: apps/predict
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: hailcast
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true