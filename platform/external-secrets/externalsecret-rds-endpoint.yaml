# RDS 엔드포인트(Parameter Store, 비용 절감을 위해 일반 설정값은 여기 저장)
# → 같은 hailcast-secret에 DB_HOST 키로 병합(Merge)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-endpoint
  namespace: hailcast
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore
    kind: ClusterSecretStore
  target:
    name: hailcast-rds-secret
    creationPolicy: Merge   # 위 rds-credentials가 먼저 만든 Secret에 키만 추가
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: /hailcast/dev/rds/endpoint   # 네이밍규약서 §5-7과 정확히 일치