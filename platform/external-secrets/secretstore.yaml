# ESO가 AWS Secrets Manager / Parameter Store를 읽기 위한 인증 설정
# auth는 ESO 컨트롤러 자체의 IRSA(SA: external-secrets, ns: external-secrets)를 사용
# → 이미선님 오후 문서 IRSA 매핑표 9번(eso) 기준
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-parameterstore
spec:
  provider:
    aws:
      service: ParameterStore
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets