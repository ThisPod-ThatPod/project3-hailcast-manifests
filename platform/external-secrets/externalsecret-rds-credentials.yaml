# RDS 마스터 비밀번호(Secrets Manager, manage_master_user_password로 자동 생성됨)
# → K8s Secret hailcast-secret 의 DB_USERNAME / DB_PASSWORD 키로 변환
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
  namespace: hailcast
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: hailcast-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        # TODO(인프라팀 확인): 네이밍규약서 §5-7 기준 hailcast-dev-secret-rds 이지만
        # manage_master_user_password 사용 시 AWS가 임의 접미사를 붙일 수 있어
        # 정확한 시크릿 이름/ARN을 이미선·신준한님께 확인 필요
        key: hailcast-dev-secret-rds
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: hailcast-dev-secret-rds
        property: password