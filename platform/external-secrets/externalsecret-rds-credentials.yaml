# RDS 마스터 비밀번호(Secrets Manager, manage_master_user_password로 자동 생성됨)
# → K8s Secret hailcast-secret 의 DB_USERNAME / DB_PASSWORD 키로 변환
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
  namespace: hailcast
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: hailcast-rds-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: "arn:aws:secretsmanager:ap-northeast-2:797452357900:secret:rds!db-d9ecba11-0893-4a4e-94d1-5ce0c425c223-DffHUP"
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "arn:aws:secretsmanager:ap-northeast-2:797452357900:secret:rds!db-d9ecba11-0893-4a4e-94d1-5ce0c425c223-DffHUP"
        property: password