apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hailcast-platform-rules
  namespace: monitoring
spec:
  groups:
    - name: hailcast.platform
      rules:
        - alert: HailcastPodNotReady
          expr: |
            max by (namespace, pod) (
              (
                kube_pod_status_phase{
                  namespace="hailcast",
                  phase=~"Pending|Unknown"
                } == 1
                or
                (
                  kube_pod_status_phase{
                    namespace="hailcast",
                    phase="Running"
                  } == 1
                  and on (namespace, pod)
                  kube_pod_status_ready{
                    namespace="hailcast",
                    condition="true"
                  } == 0
                )
              )
              unless on (namespace, pod)
              kube_pod_owner{
                namespace="hailcast",
                owner_kind="Job"
              }
              unless on (namespace, pod)
              kube_pod_deletion_timestamp{
                namespace="hailcast"
              }
            ) > 0
          for: 15m
          labels:
            severity: warning
            component: platform
          annotations:
            summary: Hailcast Pod is not ready
            description: Pod {{ $labels.namespace }}/{{ $labels.pod }} has remained non-ready for more than 15 minutes.

        - alert: HailcastDeploymentReplicasMismatch
          expr: |
            kube_deployment_status_replicas_available{
              namespace="hailcast"
            }
              < on (namespace, deployment)
            kube_deployment_spec_replicas{
              namespace="hailcast"
            }
          for: 10m
          labels:
            severity: warning
            component: platform
          annotations:
            summary: Hailcast Deployment has unavailable replicas
            description: Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has not reached its desired available replica count for 10 minutes.

        - alert: HailcastContainerCrashLooping
          expr: |
            kube_pod_container_status_waiting_reason{
              namespace="hailcast",
              reason="CrashLoopBackOff"
            } == 1
          for: 5m
          labels:
            severity: critical
            component: platform
          annotations:
            summary: Hailcast container is crash looping
            description: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has remained in CrashLoopBackOff for 5 minutes.

        - alert: HailcastContainerHighMemory
          expr: |
            (
              max by (namespace, pod, container) (
                container_memory_working_set_bytes{
                  namespace="hailcast",
                  container!="",
                  container!="POD",
                  image!=""
                }
              )
              /
              on (namespace, pod, container)
              max by (namespace, pod, container) (
                kube_pod_container_resource_limits{
                  namespace="hailcast",
                  resource="memory",
                  unit="byte"
                } > 0
              )
            ) > 0.9
          for: 15m
          labels:
            severity: warning
            component: platform
          annotations:
            summary: Hailcast container memory usage is high
            description: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has used more than 90% of its memory limit for 15 minutes.

        - alert: HailcastPrometheusTargetDown
          expr: up{namespace="hailcast"} == 0
          for: 5m
          labels:
            severity: critical
            component: platform
          annotations:
            summary: Hailcast Prometheus target is down
            description: Prometheus target {{ $labels.job }}/{{ $labels.instance }} in namespace {{ $labels.namespace }} has been down for 5 minutes.

        - alert: HailcastPrometheusTargetMissing
          expr: absent(up{namespace="hailcast", service="predict"})
          for: 10m
          labels:
            severity: critical
            component: platform
          annotations:
            summary: Hailcast Predict metrics target is missing
            description: Prometheus has discovered no target for Service hailcast/predict for 10 minutes. Check the ServiceMonitor, Service, endpoints, and Prometheus selector configuration.

        - alert: HailcastHPAScalingInactive
          expr: |
            kube_horizontalpodautoscaler_status_condition{
              namespace="hailcast",
              condition="ScalingActive",
              status="false"
            } == 1
          for: 10m
          labels:
            severity: warning
            component: platform
          annotations:
            summary: Hailcast HPA cannot calculate desired replicas
            description: HPA {{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} has reported ScalingActive=false for 10 minutes and cannot calculate desired replicas from a valid metric.
