apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: call-api
  namespace: hailcast
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-northeast-2:797452357900:certificate/f874ce9a-56d7-47a5-9819-12508db8e596"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/group.name: hailcast-dev
    # 비용관리 런북 §3-4: ALB는 런타임 생성이라 default_tags가 안 붙어서 어노테이션 필수
    alb.ingress.kubernetes.io/tags: "Project=hailcast,Environment=dev"
spec:
  rules:
    - host: origin.hailcast.myminiinfra.store
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # TODO(재혁님 확인): call-api Service/포트 이름 미확정 (아직 apps/call-api엔 .gitkeep뿐)
                name: call-api
                port:
                  name: http