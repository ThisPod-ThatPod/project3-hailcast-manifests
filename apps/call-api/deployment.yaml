apiVersion: apps/v1
kind: Deployment
metadata:
  name: hailcast-call-api
  namespace: hailcast
  labels:
    app: hailcast-call-api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hailcast-call-api
  template:
    metadata:
      labels:
        app: hailcast-call-api
    spec:
      serviceAccountName: call-api-sa
      containers:
        - name: call-api
          image: 797452357900.dkr.ecr.ap-northeast-2.amazonaws.com/hailcast-dev-call-api:<GITHUB_SHA>
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: AWS_REGION
              value: "ap-northeast-2"
            - name: JSON_STORE_BACKEND
              value: "s3"
            - name: SQS_QUEUE_URL
              value: "https://sqs.ap-northeast-2.amazonaws.com/797452357900/hailcast-dev-call-queue"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: hailcast-rds-secret
                  key: DB_HOST
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "hailcast"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hailcast-rds-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hailcast-rds-secret
                  key: DB_PASSWORD