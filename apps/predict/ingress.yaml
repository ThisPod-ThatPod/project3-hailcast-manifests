# call-api(/api/*, order 20)보다 먼저 평가돼야 하므로 group.order를 10으로 지정
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: predict
  namespace: hailcast
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-northeast-2:797452357900:certificate/f874ce9a-56d7-47a5-9819-12508db8e596"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/group.name: hailcast-dev
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/tags: "Project=hailcast,Environment=dev"
spec:
  rules:
    - host: origin.hailcast.myminiinfra.store
      http:
        paths:
          - path: /api/dashboard/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: predict
                port:
                  number: 8003
          - path: /api/scaling/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: predict
                port:
                  number: 8003
          - path: /api/prediction/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: predict
                port:
                  number: 8003