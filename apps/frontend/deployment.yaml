# frontend Deployment — nginx가 정적 빌드 산출물을 서빙 (port 80)
# AWS API를 직접 호출하지 않아 IRSA/ServiceAccount 불필요(default SA로 충분)
# app repo k8s/frontend-deployment.yaml 참고
# VITE_* 값(API 주소)은 빌드 시점 ARG로 이미지에 굽는 값이라 여기 env로 없음 —
# 나안(7/23 팀 결정)에 따라 /api 상대경로로 빌드돼야 함, app repo build.yml 소관
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hailcast-frontend
  namespace: hailcast
  labels:
    app: hailcast-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hailcast-frontend
  template:
    metadata:
      labels:
        app: hailcast-frontend
    spec:
      containers:
        - name: frontend
          image: 797452357900.dkr.ecr.ap-northeast-2.amazonaws.com/hailcast-dev-frontend:<GITHUB_SHA>
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"