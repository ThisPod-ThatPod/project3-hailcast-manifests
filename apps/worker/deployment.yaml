apiVersion: apps/v1
kind: Deployment
metadata:
  name: hailcast-worker
  namespace: hailcast
  labels:
    app: hailcast-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hailcast-worker
  template:
    metadata:
      labels:
        app: hailcast-worker
    spec:
      serviceAccountName: worker-sa
      containers:
        - name: worker
          image: 797452357900.dkr.ecr.ap-northeast-2.amazonaws.com/hailcast-dev-worker:<GITHUB_SHA> # GITHUB_SHA는 app CI가 치환 (안건 A, 재혁님 담당)
          resources: # ⑧ Karpenter 오토스케일링 시연용 
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
          env:
            - name: SQS_QUEUE_URL
              value: "https://sqs.ap-northeast-2.amazonaws.com/797452357900/hailcast-dev-call-queue"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: hailcast-secret
                  key: DB_HOST
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hailcast-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hailcast-secret
                  key: DB_PASSWORD