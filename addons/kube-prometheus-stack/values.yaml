crds:
  enabled: true

# EKS가 관리하며 클러스터 내부에서 직접 수집할 endpoint가 없는 구성요소.
kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

# 현재 EKS 구성에서는 kube-proxy metrics endpoint를 별도로 노출하지 않으므로 비활성화.
kubeProxy:
  enabled: false

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  adminUser: admin
  env:
    GF_AUTH_ANONYMOUS_ENABLED: "false"
    GF_AUTH_DISABLE_LOGIN_FORM: "false"
  ingress:
    enabled: false
  persistence:
    enabled: false

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - 'severity = "critical"'
        target_matchers:
          - 'severity =~ "warning|info"'
        equal:
          - namespace
          - alertname
      - source_matchers:
          - 'severity = "warning"'
        target_matchers:
          - 'severity = "info"'
        equal:
          - namespace
          - alertname
      - source_matchers:
          - 'alertname = "InfoInhibitor"'
        target_matchers:
          - 'severity = "info"'
        equal:
          - namespace
      - target_matchers:
          - 'alertname = "InfoInhibitor"'
    route:
      receiver: telegram
      group_by:
        - alertname
        - namespace
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - receiver: "null"
          matchers:
            - 'alertname = "Watchdog"'
        - receiver: "null"
          matchers:
            - 'alertname = "InfoInhibitor"'
    receivers:
      - name: "null"
      - name: telegram
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot-token
            chat_id_file: /etc/alertmanager/secrets/alertmanager-telegram/chat-id
            parse_mode: HTML
            send_resolved: true
  alertmanagerSpec:
    secrets:
      - alertmanager-telegram
    storage: {}

prometheus:
  enabled: true
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    storageSpec: {}
