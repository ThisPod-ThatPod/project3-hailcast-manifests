crds:
  enabled: true

# EKS가 관리하며 클러스터 내부에서 직접 수집할 endpoint가 없는 구성요소.
kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

# 현재 EKS 구성에서는 kube-proxy metrics endpoint를 별도로 노출하지 않으므로 비활성화.
kubeProxy:
  enabled: false

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  adminUser: admin
  env:
    GF_AUTH_ANONYMOUS_ENABLED: "false"
    GF_AUTH_DISABLE_LOGIN_FORM: "false"
  ingress:
    enabled: false
  persistence:
    enabled: false

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace:
        - monitoring
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true

alertmanager:
  enabled: true
  templateFiles:
    telegram-hailcast.tmpl: |-
      {{ define "telegram.hailcast.message" -}}
      {{- if eq .Status "firing" -}}
      <b>🔥 FIRING</b>
      {{- else -}}
      <b>✅ RESOLVED</b>
      {{- end }}
      <b>{{ printf "%.100s" .CommonLabels.alertname | html }}</b>

      Firing: {{ len .Alerts.Firing }} · Resolved: {{ len .Alerts.Resolved }}
      {{ range $index, $alert := .Alerts -}}
      {{- if lt $index 4 }}

      {{ if eq $alert.Status "firing" -}}🔥 <b>FIRING</b>{{ else -}}✅ <b>RESOLVED</b>{{ end }}
      Severity: {{ printf "%.20s" $alert.Labels.severity | html }}
      {{- if $alert.Labels.deployment }}
      Deployment: {{ printf "%.63s" $alert.Labels.namespace | html }}/{{ printf "%.120s" $alert.Labels.deployment | html }}
      {{- else if $alert.Labels.horizontalpodautoscaler }}
      HPA: {{ printf "%.63s" $alert.Labels.namespace | html }}/{{ printf "%.120s" $alert.Labels.horizontalpodautoscaler | html }}
      {{- else if $alert.Labels.pod }}
      Pod: {{ printf "%.63s" $alert.Labels.namespace | html }}/{{ printf "%.120s" $alert.Labels.pod | html }}
      {{- else if $alert.Labels.service }}
      Service: {{ printf "%.63s" $alert.Labels.namespace | html }}/{{ printf "%.120s" $alert.Labels.service | html }}
      {{- else if $alert.Labels.job }}
      Target: {{ printf "%.120s" $alert.Labels.job | html }}/{{ printf "%.120s" $alert.Labels.instance | html }}
      {{- end }}
      {{- with $alert.Annotations.summary }}
      Summary: {{ printf "%.120s" . | html }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- if gt (len .Alerts) 4 }}

      … Additional alerts omitted (total: {{ len .Alerts }}).
      {{- end }}
      {{- end }}
    discord-hailcast.tmpl: |-
      {{ define "discord.hailcast.title" -}}
      {{- if eq .Status "firing" -}}🔥 FIRING{{- else -}}✅ RESOLVED{{- end }} — {{ printf "%.100s" .CommonLabels.alertname }}
      {{- end }}
      {{ define "discord.hailcast.message" -}}
      Firing: {{ len .Alerts.Firing }} · Resolved: {{ len .Alerts.Resolved }}
      {{ range $index, $alert := .Alerts -}}
      {{- if lt $index 4 }}

      {{ if eq $alert.Status "firing" -}}🔥 **FIRING**{{ else -}}✅ **RESOLVED**{{ end }}
      Severity: {{ printf "%.20s" $alert.Labels.severity }}
      {{- if $alert.Labels.deployment }}
      Deployment: {{ printf "%.63s" $alert.Labels.namespace }}/{{ printf "%.120s" $alert.Labels.deployment }}
      {{- else if $alert.Labels.horizontalpodautoscaler }}
      HPA: {{ printf "%.63s" $alert.Labels.namespace }}/{{ printf "%.120s" $alert.Labels.horizontalpodautoscaler }}
      {{- else if $alert.Labels.pod }}
      Pod: {{ printf "%.63s" $alert.Labels.namespace }}/{{ printf "%.120s" $alert.Labels.pod }}
      {{- else if $alert.Labels.service }}
      Service: {{ printf "%.63s" $alert.Labels.namespace }}/{{ printf "%.120s" $alert.Labels.service }}
      {{- else if $alert.Labels.job }}
      Target: {{ printf "%.120s" $alert.Labels.job }}/{{ printf "%.120s" $alert.Labels.instance }}
      {{- end }}
      {{- with $alert.Annotations.summary }}
      Summary: {{ printf "%.120s" . }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- if gt (len .Alerts) 4 }}

      … Additional alerts omitted (total: {{ len .Alerts }}).
      {{- end }}
      {{- end }}
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - 'severity = "critical"'
        target_matchers:
          - 'severity =~ "warning|info"'
        equal:
          - namespace
          - alertname
      - source_matchers:
          - 'severity = "warning"'
        target_matchers:
          - 'severity = "info"'
        equal:
          - namespace
          - alertname
      - source_matchers:
          - 'alertname = "InfoInhibitor"'
        target_matchers:
          - 'severity = "info"'
        equal:
          - namespace
      - target_matchers:
          - 'alertname = "InfoInhibitor"'
    route:
      receiver: "null"
      group_by:
        - alertname
        - namespace
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - 'alertname = "Watchdog"'
        - receiver: "null"
          matchers:
            - 'alertname = "InfoInhibitor"'
        - receiver: telegram-discord
          matchers:
            - 'alertname =~ "KubeNodeNotReady|KubeNodeUnreachable|PrometheusRuleFailures|PrometheusBadConfig|AlertmanagerFailedReload|PrometheusOperatorRejectedResources|PrometheusOperatorReconcileErrors|PrometheusNotConnectedToAlertmanagers|PrometheusErrorSendingAlertsToAnyAlertmanager"'
        - receiver: telegram-discord
          matchers:
            - 'alertname = "KubePersistentVolumeFillingUp"'
            - 'namespace = "monitoring"'
        - receiver: telegram-discord
          matchers:
            - 'component = "platform"'
            - 'severity =~ "warning|critical"'
    receivers:
      - name: "null"
      - name: telegram-discord
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot-token
            chat_id_file: /etc/alertmanager/secrets/alertmanager-telegram/chat-id
            parse_mode: HTML
            message: '{{ template "telegram.hailcast.message" . }}'
            send_resolved: true
        discord_configs:
          - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord/webhook-url
            title: '{{ template "discord.hailcast.title" . }}'
            message: '{{ template "discord.hailcast.message" . }}'
            send_resolved: true
  alertmanagerSpec:
    secrets:
      - alertmanager-telegram
      - alertmanager-discord
    storage: {}

prometheus:
  enabled: true
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    storageSpec: {}
