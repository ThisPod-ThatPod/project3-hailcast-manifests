crds:
  enabled: true

# EKS가 관리하며 클러스터 내부에서 직접 수집할 endpoint가 없는 구성요소.
kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

# 현재 EKS 구성에서는 kube-proxy metrics endpoint를 별도로 노출하지 않으므로 비활성화.
kubeProxy:
  enabled: false

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  adminUser: admin
  env:
    GF_AUTH_ANONYMOUS_ENABLED: "false"
    GF_AUTH_DISABLE_LOGIN_FORM: "false"
  ingress:
    enabled: false
  persistence:
    enabled: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage: {}

prometheus:
  enabled: true
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    storageSpec: {}
