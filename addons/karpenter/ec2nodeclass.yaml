apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: hailcast-dev
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: hailcast-dev
  role: hailcast-dev-eks-node-role
  tags:
    karpenter.sh/discovery: hailcast-dev
    Project: hailcast
    Environment: dev
    ManagedBy: terraform
