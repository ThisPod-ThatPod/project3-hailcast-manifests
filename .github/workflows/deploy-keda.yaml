name: deploy-keda

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment
        required: true
        default: dev
        type: environment
      dry_run:
        description: Helm template까지만 실행
        required: true
        default: true
        type: boolean
      verify_only:
        description: 기존 EKS 배포 상태만 검증
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  keda:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Mask KEDA role ARN
        if: ${{ inputs.verify_only == false }}
        env:
          KEDA_ROLE_ARN: ${{ secrets.KEDA_ROLE_ARN }}
        run: |
          if [[ -z "${KEDA_ROLE_ARN:-}" ]]; then
            echo "::error::Required GitHub Secret KEDA_ROLE_ARN is missing or empty."
            exit 1
          fi
          echo "::add-mask::$KEDA_ROLE_ARN"

      - name: Block cluster operations until EKS access is approved
        if: ${{ inputs.dry_run == false || inputs.verify_only == true }}
        run: |
          echo "::error::GitHub Actions용 EKS 인증 및 kubeconfig 계약이 아직 없습니다."
          echo "::error::현재 workflow는 dry_run=true, verify_only=false만 허용합니다."
          exit 1

      - uses: actions/setup-python@v5
        if: ${{ inputs.dry_run == true && inputs.verify_only == false }}
        with:
          python-version: "3.12"

      - name: Install pinned PyYAML
        if: ${{ inputs.dry_run == true && inputs.verify_only == false }}
        run: python -m pip install --disable-pip-version-check --no-cache-dir "PyYAML==6.0.2"

      - uses: azure/setup-helm@v4
        with:
          version: v3.21.2

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.29.15

      - name: Add KEDA Helm repository
        run: |
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update kedacore

      - name: Render KEDA manifests
        if: ${{ inputs.dry_run == true && inputs.verify_only == false }}
        env:
          KEDA_ROLE_ARN: ${{ secrets.KEDA_ROLE_ARN }}
        run: scripts/keda/deploy.sh --mode workflow --dry-run --yes

      - name: Deploy KEDA
        if: ${{ inputs.dry_run == false && inputs.verify_only == false }}
        env:
          KEDA_ROLE_ARN: ${{ secrets.KEDA_ROLE_ARN }}
          KEDA_EXPECTED_CONTEXT: ${{ vars.KEDA_EXPECTED_CONTEXT }}
        run: scripts/keda/deploy.sh --mode workflow --yes

      - name: Verify KEDA
        if: ${{ inputs.verify_only == true }}
        run: scripts/keda/deploy.sh --mode workflow --verify-only
